# Local development database — NOT used for production (see docker-compose.yml for that)
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down          # stop
#   docker compose -f docker-compose.dev.yml down -v        # stop + wipe data

services:
  postgres:
    image: postgres:16
    container_name: hospital-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospital
    ports:
      - "5432:5432"
    volumes:
      - hospital_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospital"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  hospital_pgdata:
