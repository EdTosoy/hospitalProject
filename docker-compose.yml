# Hospital Project - Docker Compose for Coolify (DockerHub-based)

services:
  backend:
    image: edtosoy/hospital-backend:latest
    expose:
      - "8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - NODE_ENV=production
      - PORT=8080
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    image: edtosoy/hospital-frontend:latest
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

# ===========================================
# DEPLOYMENT GUIDE
# ===========================================
#
# BUILD & PUSH (from project root):
#
#   # Backend
#   docker build --platform linux/amd64 --no-cache \
#     --build-arg DATABASE_URL="postgresql://postgres:postgres@localhost:5432/hospital" \
#     -f Dockerfile.backend -t edtosoy/hospital-backend:latest .
#   docker push edtosoy/hospital-backend:latest
#
#   # Frontend (replace URL with your backend domain)
#   docker build --platform linux/amd64 --no-cache \
#     --build-arg NEXT_PUBLIC_API_URL=http://backend-hospital.34.53.103.130.sslip.io \
#     -f Dockerfile.frontend -t edtosoy/hospital-frontend:latest .
#   docker push edtosoy/hospital-frontend:latest
#
# COOLIFY ENVIRONMENT VARIABLES:
#   - DATABASE_URL=your-supabase-connection-string
#   - JWT_SECRET=your-secure-secret
#   - CORS_ORIGIN=http://frontend-hospital.34.53.103.130.sslip.io
